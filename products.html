<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Exclusive E-commerce - Wishlist Section Clone">

  <title>Wishlist</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./src/output.css">

  <style>
    body{
      font-family:'Inter',sans-serif;
    }
  </style>

</head>

<body class="bg-white">

    <!-- NAVBAR -->

    <header class="border-b border-gray-200 bg-white">

        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

            <div class="flex items-center justify-between h-[70px]">

                <div>
                    <h1 class="text-[32px] font-bold">
                        Exclusive
                    </h1>
                </div>


                <!-- Desktop Menu -->

                <ul class="hidden md:flex items-center gap-12">

                    <li>
                        <a href="#" class="border-b border-black pb-1">
                            Home
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            Contact
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            About
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            Sign Up
                        </a>
                    </li>

                </ul>


                <!-- Right side -->

                <div class="flex items-center gap-5">

                    <div class="hidden sm:flex items-center bg-[#F5F5F5] px-4 py-3 rounded">

                        <input
                        type="text"
                        placeholder="What are you looking for?"
                        class="bg-transparent outline-none w-[240px] text-sm">

                        <img
                        src="./src/images/search-icon.png"
                        class="w-5 h-5 ml-4">

                    </div>


                    <button>
                        <img
                        src="./src/images/heart-icon.png"
                        class="w-6 h-6">
                    </button>

                    <button>
                        <img
                        src="./src/images/cart-icon.png"
                        class="w-6 h-6">
                    </button>

                </div>

            </div>

        </nav>

    </header>



    <!-- MAIN CONTENT -->

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">

        <!-- Wishlist Section -->

        <section class="mb-24">

            <div class="flex justify-between items-center mb-12">

                <h2 class="text-2xl font-medium">
                    Wishlist
                    <span class="text-gray-500">(4)</span>
                </h2>

                <button class="border border-gray-300 px-10 py-4 rounded">
                    Move All To Bag
                </button>

            </div>


            <!-- Paste wishlist cards grid here -->

        </section>



        <!-- Just For You Section -->

        <section>

            <div class="flex justify-between items-center mb-12">

                <div class="flex items-center gap-4">

                    <span class="w-5 h-10 bg-[#DB4444] rounded"></span>

                    <h2 class="text-2xl font-medium">
                        Just For You
                    </h2>

                </div>

                <button class="border border-gray-300 px-10 py-4 rounded">
                    See All
                </button>

            </div>


            <!-- Paste recommendation cards grid here -->

        </section>

    </main>

</body>
</html>
