<!DOCTYPE html>

<head>

    <title>Wishlist | Exclusive</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="./src/output.css">

    <style>
        body {

<body class="bg-white min-h-screen">

    <!-- ================= NAVBAR ================= -->
    <header class="w-full border-b border-gray-200 bg-white">

            <div class="h-[70px] flex items-center justify-between">
                
                <!-- Logo -->
                <h1 class="text-[32px] font-bold">Exclusive</h1>

                <!-- Desktop Navigation -->
                <ul class="hidden md:flex items-center gap-12 text-sm font-medium">
                    <li><a href="#" class="border-b border-black pb-1">Home</a></li>
                    <li><a href="#" class="hover:text-gray-500 transition">Contact</a></li>
                    <li><a href="#" class="hover:text-gray-500 transition">About</a></li>
                    <li><a href="#" class="hover:text-gray-500 transition">Sign Up</a></li>
                </ul>

                <!-- Search and Icons -->
                <div class="flex items-center gap-6">
                    <div class="hidden sm:flex items-center bg-[#F5F5F5] px-4 py-3 rounded">
                        <input 
                            type="text" 
                            placeholder="What are you looking for?" 
                            class="bg-transparent outline-none text-sm w-[220px]"
                        >
                        <img 
                            src="./src/images/search-icon.png" 
                            class="w-5 h-5 ml-4" 
                            alt="Search"
                        >
                    </div>

                    <div class="flex items-center gap-5">
                        <button>
                            <img src="./src/images/heart-icon.png" class="w-6 h-6" alt="Wishlist">
                        </button>
                        <button>
                            <img src="./src/images/cart-icon.png" class="w-6 h-6" alt="Cart">
                        </button>
                    </div>
                </div>
            </div>
        </nav>

                        <img src="./src/images/guccibag.png" class="h-[180px] mx-auto object-contain" alt="Gucci Duffle Bag">

            </div>
