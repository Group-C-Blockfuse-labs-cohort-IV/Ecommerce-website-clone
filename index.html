<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce website</title>
    <link rel="stylesheet" href="src/output.css">
</head>

<body>


    <!-- Music-Experience-Section -->
    <section class="min-h-screen bg-white flex items-center justify-center p-6">
        <!-- music-xp-card -->
        <div class="max-w-[1170px] w-full bg-black p-6 md:p-10 flex flex-col md:flex-row items-center justify-between overflow-hidden ">
            <div class="flex flex-col gap-4">
                <h4 class="text-green-500 font-bold">Categories</h4>
                <h2 class="text-white font-bold text-2xl md:text-4xl leading-tight ">Enhance Your<br>
                    Music Experience
                </h2>
                <!-- Timer boxes -->
                <div class="inline-flex flex-wrap gap-3">
                    <span
                        class="inline-flex flex-col  items-center justify-center bg-white text-black w-17 h-17 rounded-full text-sm text-center">
                        <strong>23</strong>Hours
                    </span>
                    <span
                        class="inline-flex flex-col items-center justify-center bg-white text-black w-17 h-17 rounded-full text-sm text-center">
                        <strong>05 </strong>Days
                    </span>
                    <span
                        class="inline-flex flex-col items-center justify-center bg-white text-black w-17 h-17 rounded-full text-sm text-center">
                        <strong>59</strong> minutes
                    </span>
                    <span
                        class=" inline-flex flex-col items-center justify-center bg-white text-black w-17 h-17 rounded-full text-sm text-center">
                        <strong>35</strong>Seconds
                    </span>
                </div>
                <button class="bg-[#00FF66] px-6 py-2 w-fit font-medium rounded-md text-white">Buy Now!</button>
            </div>
            <img src="music-experience-section-img/jam_box.png" alt="jam_box"
                class="max-w-sm md:max-w-md lg:max-w-lg mt-6 md:mt-0">


        </div>
    </section>





</body>

</html>
