<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce website</title>
    <link rel="stylesheet" href="src/output.css">
</head>

<body>

   
<div class="flex items-center gap-3 mx-4 sm:mx-8 lg:mx-10 mt-10">
  <img src="/images/image.png" alt="" class="w-4 h-8 sm:w-5 sm:h-10">
  <h1 class="text-amber-600 font-medium text-sm sm:text-base">
    This Month
  </h1>
</div>


<div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mx-4 sm:mx-8 lg:mx-10 mt-6">
  <h1 class="font-bold text-2xl sm:text-3xl">
    Best Selling Products
  </h1>

  <button class="border bg-secondary px-6 py-3 text-white rounded-md hover:opacity-90 transition">
    View All
  </button>
</div>

<!--CARDS -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 px-4 sm:px-8 lg:px-10 mt-10">

  <!--  First Card  -->
  <div>
    <div class="relative bg-primary rounded-lg h-[240px] flex items-center justify-center">
      <img src="/images/jacket.png" alt="" class="w-36 h-48 object-contain">

      <div class="absolute top-4 right-4 space-y-2">
        <img src="/images/love.png" alt="" class="w-8 h-8">
        <img src="/images/eye.png" alt="" class="w-8 h-8">
      </div>
    </div>

    <div class="mt-4">
      <h2 class="font-black">The north coat</h2>

      <p>
        <span class="text-red-700">$260</span>
        <span class="line-through text-gray-500">$360</span>
      </p>

      <div class="flex items-center gap-1 mt-2 flex-wrap">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <p>(65)</p>
      </div>
    </div>
  </div>

  <!--  SecondCard  -->
  <div>
    <div class="relative bg-primary rounded-lg h-[240px] flex items-center justify-center">
      <img src="/images/bag.png" alt="" class="w-36 h-48 object-contain">

      <div class="absolute top-4 right-4 space-y-2">
        <img src="/images/love.png" alt="" class="w-8 h-8">
        <img src="/images/eye.png" alt="" class="w-8 h-8">
      </div>
    </div>

    <div class="mt-4">
      <h2 class="font-black">Gucci duffle bag</h2>

      <p>
        <span class="text-red-700">$960</span>
        <span class="line-through text-gray-500">$1160</span>
      </p>

      <div class="flex items-center gap-1 mt-2 flex-wrap">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/half star.png" alt="" class="w-5 h-5">
        <p>(65)</p>
      </div>
    </div>
  </div>

  <!--  Third Card  -->
  <div>
    <div class="relative bg-primary rounded-lg h-[240px] flex items-center justify-center">
      <img src="/images/speaker.png" alt="" class="w-36 h-48 object-contain">

      <div class="absolute top-4 right-4 space-y-2">
        <img src="/images/love.png" alt="" class="w-8 h-8">
        <img src="/images/eye.png" alt="" class="w-8 h-8">
      </div>
    </div>

    <div class="mt-4">
      <h2 class="font-black">RGB liquid CPU Cooler</h2>

      <p>
        <span class="text-red-700">$160</span>
        <span class="line-through text-gray-500">$170</span>
      </p>

      <div class="flex items-center gap-1 mt-2 flex-wrap">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/half star.png" alt="" class="w-5 h-5">
        <p>(65)</p>
      </div>
    </div>
  </div>

  <!--  Fourth Card -->
  <div>
    <div class="relative bg-primary rounded-lg h-[240px] flex items-center justify-center">
      <img src="/images/chair.png" alt="" class="w-36 h-48 object-contain">

      <div class="absolute top-4 right-4 space-y-2">
        <img src="/images/love.png" alt="" class="w-8 h-8">
        <img src="/images/eye.png" alt="" class="w-8 h-8">
      </div>
    </div>

    <div class="mt-4">
      <h2 class="font-black">Small BookSelf</h2>

      <p>
        <span class="text-red-700">$260</span>
        <span class="line-through text-gray-500">$360</span>
      </p>

      <div class="flex items-center gap-1 mt-2 flex-wrap">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <img src="/images/star.png" alt="" class="w-5 h-5">
        <p>(65)</p>
      </div>
    </div>
  </div>

</div>


<div class="mx-4 sm:mx-8 lg:mx-10 mt-16 bg-quaternary rounded-xl p-6 sm:p-10 mt-28">

  <h2 class="text-green-500 font-bold mb-6">
    Categories
  </h2>

  <div class="flex flex-col lg:flex-row items-center justify-between gap-10">

    
    <div class="text-center lg:text-left">
      <h1 class="text-white font-bold text-3xl sm:text-5xl leading-tight">
        Enhance Your <br>
        Music Experience
      </h1>

      
      <div class="flex justify-center lg:justify-start flex-wrap gap-3 mt-8">
        <img src="/images/23 hours.png" alt="" class="w-14 h-14">
        <img src="/images/5 days.png" alt="" class="w-14 h-14">
        <img src="/images/59 minutes.png" alt="" class="w-14 h-14">
        <img src="/images/35 seconds.png" alt="" class="w-14 h-14">
      </div>

      
      <button class="bg-tertiary text-white px-8 py-3 rounded-lg mt-8 hover:opacity-90 transition">
        Buy Now!
      </button>
    </div>

    
    <div class="w-full lg:w-auto flex justify-center">
      <img
        src="/images/jbl speaker.png"
        alt=""
        class="w-full max-w-[568px] object-contain drop-shadow-md"
      >
    </div>

  </div>
</div>


    
</body>
</html>
